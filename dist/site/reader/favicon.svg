<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="40%" cy="38%" r="65%">
      <stop offset="0%"   stop-color="#2e1a08"/>
      <stop offset="100%" stop-color="#0f0802"/>
    </radialGradient>
    <radialGradient id="dot" cx="35%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#c47e1a"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .orbit  { animation: spin  5s linear        infinite; transform-origin: 16px 16px; }
      .pulse  { animation: glow  2.4s ease-in-out infinite; }
      .rays   { animation: spin  8s linear        infinite reverse; transform-origin: 16px 16px; }
      @keyframes spin { to   { transform: rotate(360deg); } }
      @keyframes glow { 0%,100% { opacity:.85; } 50% { opacity:1; } }
    </style>
  </defs>

  <!-- Background disc -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="#c47e1a" stroke-width="0.3" opacity="0.35"/>

  <!-- Orbit track -->
  <circle cx="16" cy="16" r="11"
    fill="none" stroke="#c47e1a" stroke-width="0.9"
    stroke-dasharray="2.8 2.2" opacity="0.55"/>

  <!-- Rotating group: orbit dot + small ray spark -->
  <g class="orbit" filter="url(#glow)">
    <!-- Dot on orbit at 0° (right side) -->
    <circle cx="27" cy="16" r="2.4" fill="url(#dot)"/>
    <!-- Tiny trailing comet tail -->
    <line x1="24.8" y1="15" x2="26.2" y2="16" stroke="#ffe066" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- Center letter H  (Human) -->
  <g class="pulse">
    <rect x="11.5" y="9.5"  width="2"   height="13" rx="0.6" fill="#fffdf5" opacity="0.95"/>
    <rect x="18.5" y="9.5"  width="2"   height="13" rx="0.6" fill="#fffdf5" opacity="0.95"/>
    <rect x="11.5" y="15.2" width="9"   height="1.8" rx="0.6" fill="#fffdf5" opacity="0.95"/>
  </g>

  <!-- Small sun rays (very subtle, counter-rotating) -->
  <g class="rays" opacity="0.18">
    <line x1="16" y1="1.5" x2="16" y2="3"   stroke="#ffd700" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="16" y1="29"  x2="16" y2="30.5" stroke="#ffd700" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="1.5" y1="16" x2="3"   y2="16"  stroke="#ffd700" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="29"  y1="16" x2="30.5" y2="16" stroke="#ffd700" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="4.5"  y1="4.5"  x2="5.6"  y2="5.6"  stroke="#ffd700" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="26.4" y1="26.4" x2="27.5" y2="27.5" stroke="#ffd700" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="27.5" y1="4.5"  x2="26.4" y2="5.6"  stroke="#ffd700" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="5.6"  y1="26.4" x2="4.5"  y2="27.5" stroke="#ffd700" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
