<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HITL Reader — Human in the Loop</title>
  <meta name="description" content="Read all editions of the Human in the Loop companion series." />
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    :root {
      --bg:#f4efe6;--bg-alt:#fbf8f2;--surface:rgba(255,255,255,.78);--border:rgba(45,62,80,.13);
      --text:#1d2935;--muted:#5b6875;--accent:#0d9e8e;
      --autumn:#b85c38;--winter:#2b3a8f;--summer:#c47e1a;
      --shadow:0 16px 36px rgba(35,44,56,.09);
      --sidebar-w:256px;--minitoc-w:192px;
      --serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Georgia,serif;
      --mono:"JetBrains Mono","SFMono-Regular","Fira Code",monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0}
    html{font-family:var(--serif);color:var(--text);background:var(--bg)}
    body{min-height:100vh}
    button{font-family:inherit;cursor:pointer;border:none;background:none}
    a{color:inherit;text-decoration:none}

    /* ── Landing ─────────────────────────────────────────── */
    #landing{max-width:960px;margin:0 auto;padding:56px 24px 80px}
    .back-link{display:inline-flex;align-items:center;gap:6px;margin-bottom:40px;
      color:var(--muted);font:.85rem var(--mono);letter-spacing:.02em;transition:color 120ms}
    .back-link::before{content:"←"}
    .back-link:hover{color:var(--accent)}
    .eyebrow{font:700 .75rem/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;
      color:var(--accent);margin-bottom:14px}
    .hero-title{font-size:clamp(2.2rem,5vw,3.6rem);line-height:.95;margin-bottom:16px}
    .hero-sub{max-width:600px;color:var(--muted);font-size:1.02rem;line-height:1.65;margin-bottom:44px}
    .edition-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:14px}
    .edition-card{display:flex;flex-direction:column;gap:8px;padding:20px 22px;
      background:var(--surface);border:1px solid var(--border);border-radius:16px;
      box-shadow:var(--shadow);text-align:left;transition:transform 120ms,border-color 120ms}
    .edition-card:hover{transform:translateY(-2px);border-color:rgba(13,158,142,.28)}
    .edition-card.autumn{border-left:4px solid var(--autumn)}
    .edition-card.winter{border-left:4px solid var(--winter)}
    .edition-card.summer{border-left:4px solid var(--summer)}
    .edition-card.core{border-left:4px solid var(--accent)}
    .card-tag{font:700 .7rem/1 var(--mono);letter-spacing:.08em;text-transform:uppercase}
    .autumn .card-tag{color:var(--autumn)} .winter .card-tag{color:var(--winter)}
    .summer .card-tag{color:var(--summer)} .core .card-tag{color:var(--accent)}
    .card-title{font-size:1.08rem;font-weight:700;margin-top:2px}
    .card-desc{color:var(--muted);font-size:.88rem;line-height:1.58;flex:1}
    .card-hint{font:.74rem var(--mono);color:var(--muted);opacity:.6;margin-top:4px}
    .site-footer{margin-top:60px;padding-top:20px;border-top:1px solid var(--border);
      color:var(--muted);font-size:.82rem}
    .site-footer a{color:var(--accent)}

    /* ── Reader layout ───────────────────────────────────── */
    #reader{display:none;height:100vh;flex-direction:column;overflow:hidden}
    #reader.active{display:flex}
    .reader-bar{display:flex;align-items:center;gap:10px;height:50px;flex-shrink:0;
      padding:0 18px;background:var(--bg-alt);border-bottom:1px solid var(--border)}
    .rbar-back{display:flex;align-items:center;gap:5px;color:var(--muted);
      font:.82rem var(--mono);padding:6px 10px;border-radius:8px;
      transition:color 100ms,background 100ms;white-space:nowrap}
    .rbar-back:hover{color:var(--accent);background:rgba(13,158,142,.08)}
    .rbar-title{flex:1;text-align:center;font-size:.9rem;font-weight:600;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rbar-actions{display:flex;gap:6px}
    .rbar-btn{font:.75rem var(--mono);padding:5px 11px;border-radius:7px;
      border:1px solid var(--border);color:var(--muted);
      transition:border-color 100ms,color 100ms,background 100ms}
    .rbar-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(13,158,142,.05)}

    .reader-body{flex:1;display:flex;overflow:hidden}

    #sidebar{width:var(--sidebar-w);flex-shrink:0;overflow-y:auto;
      background:var(--bg-alt);border-right:1px solid var(--border);padding:12px 0 20px}
    .toc-label{font:700 .65rem/1 var(--mono);letter-spacing:.09em;text-transform:uppercase;
      color:var(--muted);padding:14px 16px 6px;display:block}
    .toc-item{display:block;padding:5px 14px;font-size:.83rem;color:var(--muted);cursor:pointer;
      line-height:1.35;transition:color 100ms,background 100ms;text-align:left;width:100%}
    .toc-item:hover{background:rgba(13,158,142,.07);color:var(--text)}
    .toc-item.active{background:rgba(13,158,142,.12);color:var(--accent);font-weight:600}
    .toc-item.h1{font-weight:700;font-size:.87rem;color:var(--text)}
    .toc-item.h3{padding-left:26px;font-size:.79rem}

    #content{flex:1;overflow-y:auto}
    .content-inner{max-width:700px;margin:0 auto;padding:40px 44px 80px}
    #loading{display:none;align-items:center;justify-content:center;
      height:200px;color:var(--muted);font:.9rem var(--mono)}
    #loading.vis{display:flex}

    #mini-toc{width:var(--minitoc-w);flex-shrink:0;overflow-y:auto;
      padding:18px 12px;border-left:1px solid var(--border)}
    .mini-label{font:700 .65rem/1 var(--mono);letter-spacing:.09em;text-transform:uppercase;
      color:var(--muted);margin-bottom:10px;display:block}
    .mini-item{display:block;padding:3px 6px;font-size:.77rem;color:var(--muted);cursor:pointer;
      line-height:1.4;border-radius:5px;transition:color 100ms;text-align:left;width:100%}
    .mini-item:hover{color:var(--text)}
    .mini-item.active{color:var(--accent);font-weight:600}

    /* ── Markdown ────────────────────────────────────────── */
    .md h1,.md h2,.md h3,.md h4{font-family:var(--serif);line-height:1.2;scroll-margin-top:16px}
    .md h1{font-size:2.1rem;margin:0 0 .7em}
    .md h2{font-size:1.5rem;margin:2em 0 .6em;border-top:1px solid var(--border);padding-top:1.5em;color:#1a2530}
    .md h3{font-size:1.15rem;margin:1.5em 0 .5em;color:#293540}
    .md h4{font-size:1rem;font-style:italic;color:var(--muted);margin:1.2em 0 .4em}
    .md p{line-height:1.78;margin:0 0 1.1em;font-size:1.02rem}
    .md ul,.md ol{margin:.5em 0 1em 1.5em}
    .md li{line-height:1.72;margin-bottom:.28em}
    .md blockquote{margin:1.5em 0;padding:.9em 1.3em;border-left:3px solid var(--accent);
      background:rgba(13,158,142,.05);border-radius:0 10px 10px 0;color:#334455}
    .md blockquote p{margin:0;font-size:.96rem}
    .md hr{border:none;border-top:1px solid var(--border);margin:2em 0}
    .md code{font:.86em var(--mono);background:rgba(45,62,80,.08);padding:2px 5px;border-radius:4px}
    .md pre{background:#1d2935;color:#dce6ef;padding:16px 20px;border-radius:10px;overflow-x:auto;margin:1.3em 0}
    .md pre code{background:none;padding:0;color:inherit;font-size:.88rem}
    .md table{width:100%;border-collapse:collapse;margin:1.4em 0;font-size:.91rem}
    .md th{background:rgba(45,62,80,.07);padding:9px 14px;text-align:left;font-weight:700;border:1px solid var(--border)}
    .md td{padding:8px 14px;border:1px solid var(--border);vertical-align:top}
    .md tr:nth-child(even) td{background:rgba(13,158,142,.035)}
    .md a{color:var(--accent);text-decoration:underline;text-underline-offset:2px}

    @media(max-width:900px){#mini-toc{display:none}}
    @media(max-width:640px){
      #sidebar{display:none}
      .content-inner{padding:24px 18px 60px}
      .rbar-title{display:none}
    }
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(45,62,80,.18);border-radius:3px}
  </style>
</head>
<body>

<div id="landing">
  <a class="back-link" href="/">what-if.io</a>
  <p class="eyebrow">PhD Reader</p>
  <h1 class="hero-title">Human in the Loop</h1>
  <p class="hero-sub">All editions of the HITL companion series — from the core argument to seasonal companions, instructor guides, and solution sets.</p>
  <div class="edition-grid" id="edition-grid"></div>
  <footer class="site-footer">
    &copy; 2026 Lazaros Toumanidis &mdash; <a href="/">what-if.io</a>
  </footer>
</div>

<div id="reader">
  <header class="reader-bar">
    <button class="rbar-back" onclick="showLanding()">← All editions</button>
    <div class="rbar-title" id="reader-title"></div>
    <div class="rbar-actions">
      <button class="rbar-btn" onclick="openInAmelie()" title="Open in Amelie Player">Open in Amelie</button>
      <button class="rbar-btn" onclick="downloadMd()" title="Download source">↓ .md</button>
    </div>
  </header>
  <div class="reader-body">
    <nav id="sidebar"><div id="sidebar-toc"></div></nav>
    <main id="content">
      <div id="loading">Loading…</div>
      <div class="content-inner md" id="content-inner"></div>
    </main>
    <aside id="mini-toc">
      <span class="mini-label">On this page</span>
      <div id="mini-items"></div>
    </aside>
  </div>
</div>

<script>
const EDITIONS=[
  {slug:'misunderstood',season:'core',tag:'Core Edition',title:'HITL: Misunderstood',
   desc:'The central argument — what Human in the Loop actually means and why it matters.',
   src:'/companion/HITL_Misunderstood.md'},
  {slug:'summer',season:'summer',tag:'Summer Workbook',title:'Summer Edition',
   desc:'Activities, puzzles, and guided practice for annotators and teams.',
   src:'/companion/HITL_Misunderstood_Summer.md'},
  {slug:'autumn',season:'autumn',tag:'Autumn Edition',title:'Before You Ship',
   desc:'Questions every team should answer before deploying ML in production.',
   src:'/companion/HITL_Autumn_Before_You_Ship.md'},
  {slug:'winter',season:'winter',tag:'Winter Edition',title:'Winter Is Coming',
   desc:'Study support working through the main textbook — twelve misconception deep dives.',
   src:'/companion/HITL_Winter_is_Coming.md'},
  {slug:'winter-solutions',season:'winter',tag:'Solutions',title:'Winter: Solutions',
   desc:'Full worked solutions for all Winter companion exercises.',
   src:'/companion/HITL_Winter_is_Coming_Solutions.md'},
  {slug:'winter-teachers',season:'winter',tag:'Instructor Guide',title:'Winter: Teachers',
   desc:'Classroom prompts, assessment ideas, and facilitator notes.',
   src:'/companion/HITL_Winter_is_Coming_Teachers.md'},
];

let current=null,spy=null;

// Build grid
const grid=document.getElementById('edition-grid');
EDITIONS.forEach(ed=>{
  const btn=document.createElement('button');
  btn.className=`edition-card ${ed.season}`;
  btn.innerHTML=`<span class="card-tag">${ed.tag}</span>
    <span class="card-title">${ed.title}</span>
    <span class="card-desc">${ed.desc}</span>
    <span class="card-hint">click to read →</span>`;
  btn.onclick=()=>openEdition(ed);
  grid.appendChild(btn);
});

function showLanding(){
  document.getElementById('landing').style.display='';
  document.getElementById('reader').classList.remove('active');
  current=null;
  history.pushState(null,'','/reader/');
}

async function openEdition(ed){
  current=ed;
  document.getElementById('landing').style.display='none';
  document.getElementById('reader').classList.add('active');
  document.getElementById('reader-title').textContent=ed.title;
  const loading=document.getElementById('loading');
  const inner=document.getElementById('content-inner');
  loading.classList.add('vis');
  inner.innerHTML='';inner.style.display='none';
  document.getElementById('sidebar-toc').innerHTML='';
  document.getElementById('mini-items').innerHTML='';
  history.pushState(null,'',`/reader/?edition=${ed.slug}`);
  try{
    const r=await fetch(ed.src);
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    render(await r.text(),ed);
  }catch(e){loading.textContent=`Failed to load: ${e.message}`}
}

function slug(s){return s.toLowerCase().replace(/[^\w\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').trim()}
function strip(s){return s.replace(/\*\*/g,'').replace(/\*/g,'').replace(/`/g,'').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1')}

function render(md,ed){
  const re=/^(#{1,3})\s+(.+)$/gm,heads=[];let m;
  while((m=re.exec(md))!==null)heads.push({level:m[1].length,text:strip(m[2].trim())});
  const idc={};
  const hw=heads.map(h=>{const b='h-'+slug(h.text);idc[b]=(idc[b]||0)+1;
    const id=idc[b]>1?`${b}-${idc[b]}`:b;return{...h,id}});
  const renderer=new marked.Renderer(),rc={};
  renderer.heading=({text,depth})=>{
    const c=strip(text.replace(/<[^>]+>/g,''));
    const b='h-'+slug(c);rc[b]=(rc[b]||0)+1;
    const id=rc[b]>1?`${b}-${rc[b]}`:b;
    return `<h${depth} id="${id}">${text}</h${depth}>`;
  };
  marked.use({renderer,breaks:false,gfm:true});
  const loading=document.getElementById('loading');
  const inner=document.getElementById('content-inner');
  loading.classList.remove('vis');
  inner.style.display='';inner.innerHTML=marked.parse(md);
  document.getElementById('content').scrollTop=0;
  buildSidebar(hw,ed);buildMini(hw);setupSpy(hw);
}

function buildSidebar(heads,ed){
  const toc=document.getElementById('sidebar-toc');
  const lbl=document.createElement('span');lbl.className='toc-label';lbl.textContent=ed.tag;
  toc.appendChild(lbl);
  heads.forEach(h=>{
    const btn=document.createElement('button');btn.className=`toc-item h${h.level}`;
    btn.textContent=h.text.length>54?h.text.slice(0,52)+'…':h.text;
    btn.dataset.id=h.id;btn.onclick=()=>scrollTo(h.id);toc.appendChild(btn);
  });
}

function buildMini(heads){
  const c=document.getElementById('mini-items');
  heads.filter(h=>h.level===2).forEach(h=>{
    const btn=document.createElement('button');btn.className='mini-item';
    btn.textContent=h.text.length>44?h.text.slice(0,42)+'…':h.text;
    btn.dataset.id=h.id;btn.onclick=()=>scrollTo(h.id);c.appendChild(btn);
  });
}

function scrollTo(id){const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'})}

function setupSpy(heads){
  if(spy)spy.disconnect();
  const content=document.getElementById('content');
  const navs=document.querySelectorAll('.toc-item,.mini-item');
  spy=new IntersectionObserver(entries=>{
    for(const e of entries){if(e.isIntersecting){
      const id=e.target.id;navs.forEach(n=>n.classList.toggle('active',n.dataset.id===id));break;
    }}
  },{root:content,rootMargin:'-8% 0px -78% 0px',threshold:0});
  heads.forEach(h=>{const el=document.getElementById(h.id);if(el)spy.observe(el)});
}

function openInAmelie(){
  if(!current)return;
  const abs=new URL(current.src,window.location.origin).href;
  window.open(`https://player.limen-os.io/?doc=${encodeURIComponent(abs)}`,'_blank');
}

function downloadMd(){
  if(!current)return;
  const a=document.createElement('a');a.href=current.src;
  a.download=current.src.split('/').pop();a.click();
}

const init=new URLSearchParams(window.location.search).get('edition');
if(init){const ed=EDITIONS.find(e=>e.slug===init);if(ed)openEdition(ed)}
</script>
</body>
</html>
