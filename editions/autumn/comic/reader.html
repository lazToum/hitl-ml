<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #222;
    --text: #ccc;
    --muted: #555;
    --accent: #e8c97a;
    --font-serif: 'Georgia', 'Times New Roman', serif;
    --font-mono: 'Courier New', monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-mono); }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .6rem 1.2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .title-block { display: flex; flex-direction: column; gap: 2px; }
  .title-block .series { font-size: .6rem; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; }
  .title-block .name   { font-size: 1rem; letter-spacing: .12em; color: var(--accent); font-family: var(--font-serif); font-style: italic; }
  .counter { font-size: .75rem; color: var(--muted); letter-spacing: .08em; min-width: 80px; text-align: right; }
  .header-right { display: flex; align-items: baseline; gap: 1rem; }
  .back-link { font-size: .65rem; letter-spacing: .08em; color: var(--muted); text-decoration: none; white-space: nowrap; }
  .back-link:hover { color: var(--accent); }

  /* ── Main stage ── */
  #stage {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    height: calc(100vh - 98px);
    overflow: hidden;
    cursor: pointer;
    user-select: none;
  }

  #stage img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    display: block;
    transition: opacity .18s ease;
  }
  #stage img.fade { opacity: 0; }

  /* click zones */
  .zone {
    position: absolute; top: 0; height: 100%; width: 40%;
    display: flex; align-items: center;
    opacity: 0; transition: opacity .15s;
    font-size: 2rem; color: rgba(255,255,255,.8);
    pointer-events: auto;
  }
  .zone:hover { opacity: 1; }
  .zone.prev { left: 0; justify-content: flex-start; padding-left: 1rem; }
  .zone.next { right: 0; justify-content: flex-end; padding-right: 1rem; }

  /* ── Filmstrip ── */
  #strip {
    height: 58px;
    display: flex; gap: 3px; align-items: center;
    padding: 6px 1rem;
    overflow-x: auto; overflow-y: hidden;
    background: var(--surface);
    border-top: 1px solid var(--border);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  #strip::-webkit-scrollbar { height: 3px; }
  #strip::-webkit-scrollbar-thumb { background: var(--border); }

  .thumb {
    flex-shrink: 0; width: 40px; height: 40px;
    object-fit: cover; border-radius: 2px;
    opacity: .4; cursor: pointer;
    border: 1px solid transparent;
    transition: opacity .12s, border-color .12s;
  }
  .thumb:hover { opacity: .7; }
  .thumb.active { opacity: 1; border-color: var(--accent); }

  /* ── Credits ── */
  .credits {
    position: absolute; bottom: 4px; right: 8px;
    font-size: .58rem; color: rgba(255,255,255,.18);
    pointer-events: none;
  }

  /* touch hint */
  @media (pointer: coarse) {
    .zone { opacity: .3; }
  }
</style>

  "20260202070.webp": "Four cartoon character cards in a server room: 'SAGE' with glasses and bowtie, glitch-goggled 'MANNY' twice, and 'RAY' holding a sparking wrench, saying 'I FIX... BY BREAKING'."
};

let current = 0;
const panel   = document.getElementById('panel');
const counter = document.getElementById('counter');
const strip   = document.getElementById('strip');

// Build filmstrip
IMAGES.forEach((src, i) => {
  const t = document.createElement('img');
  t.className = 'thumb' + (i === 0 ? ' active' : '');
  t.loading = 'lazy';
  t.src = 'images/' + src;
  t.alt = '';
  t.dataset.i = i;
  t.onclick = () => goto(i);
  strip.appendChild(t);
});

function goto(i) {
  if (i < 0 || i >= IMAGES.length) return;
  panel.classList.add('fade');
  setTimeout(() => {
    current = i;
    panel.src = 'images/' + IMAGES[i];
    panel.alt = 'AGENTS comic, panel ' + (i + 1) + ' of ' + IMAGES.length + ': ' + (ALTS[IMAGES[i]] || 'Comic panel');
    panel.classList.remove('fade');
    counter.textContent = (i + 1) + ' / ' + IMAGES.length;
    // Update filmstrip
    strip.querySelectorAll('.thumb').forEach((t, j) => t.classList.toggle('active', j === i));
    // Scroll filmstrip to active thumb
    const active = strip.children[i];
    if (active) active.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
    // Preload neighbours
    [i+1, i+2].forEach(n => { if (IMAGES[n]) new Image().src = 'images/' + IMAGES[n]; });
  }, 90);
}

document.getElementById('btn-prev').onclick = () => goto(current - 1);
document.getElementById('btn-next').onclick = () => goto(current + 1);

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goto(current + 1); }
  if (e.key === 'ArrowLeft')                   { e.preventDefault(); goto(current - 1); }
  if (e.key === 'Home')  goto(0);
  if (e.key === 'End')   goto(IMAGES.length - 1);
});

// Touch swipe
let tx = 0;
const stage = document.getElementById('stage');
stage.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
stage.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) goto(dx < 0 ? current + 1 : current - 1);
});

// Preload first few
[1,2,3].forEach(n => { if (IMAGES[n]) new Image().src = 'images/' + IMAGES[n]; });
</script>
