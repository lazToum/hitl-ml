services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       treasure_hunt
      POSTGRES_USER:     hunt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hunt_secret}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hunt -d treasure_hunt"]
      interval: 5s
      timeout: 3s
      retries: 10

  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.14.0
    command: start-from-init --masterkeyFromEnv --tlsMode disabled
    environment:
      ZITADEL_MASTERKEY:                                       ${ZITADEL_MASTERKEY:-MasterkeyNeedsToHave32Characters}
      ZITADEL_DATABASE_POSTGRES_HOST:                          postgres
      ZITADEL_DATABASE_POSTGRES_PORT:                          5432
      ZITADEL_DATABASE_POSTGRES_DATABASE:                      zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME:                 hunt
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD:                 ${POSTGRES_PASSWORD:-hunt_secret}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE:                 disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME:                hunt
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD:                ${POSTGRES_PASSWORD:-hunt_secret}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE:                disable
      ZITADEL_EXTERNALSECURE:                                  "false"
      ZITADEL_EXTERNALPORT:                                    8180
      ZITADEL_EXTERNALDOMAIN:                                  localhost
      ZITADEL_FIRSTINSTANCE_ORG_NAME:                          TreasureHunt
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME:                admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD:                ${ZITADEL_ADMIN_PASSWORD:-Admin1234!}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED:  "false"
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH:                        /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME:          login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME:              Login Client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE:        "2099-01-01T00:00:00Z"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED:               "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI:                http://localhost:8180/ui/v2/login/
      ZITADEL_OIDC_DEFAULTLOGINURLV2:                                  http://localhost:8180/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2:                                 http://localhost:8180/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2:                                  http://localhost:8180/ui/v2/login/login?samlRequest=
      ZITADEL_PORT:                                                     8180
    volumes:
      - ./zitadel/bootstrap:/zitadel/bootstrap
      - ./zitadel/ready.yaml:/etc/zitadel/ready.yaml:ro
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready", "--config", "/etc/zitadel/ready.yaml"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 30s
    depends_on:
      postgres: { condition: service_healthy }

  login:
    image: ghcr.io/zitadel/zitadel-login:v4.14.0
    environment:
      ZITADEL_API_URL:                http://nginx:80
      NEXT_PUBLIC_BASE_PATH:          /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS:         x-zitadel-forwarded-proto:http,x-zitadel-public-host:localhost:8180
    volumes:
      - ./zitadel/bootstrap:/zitadel/bootstrap:ro
    depends_on:
      zitadel: { condition: service_healthy }
      nginx:   { condition: service_started }

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8180:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - zitadel

  rust-api:
    build:
      context: ./backend-rust
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${RUST_API_HOST_PORT:-8080}:8080"
    environment:
      DATABASE_URL:   postgres://hunt:${POSTGRES_PASSWORD:-hunt_secret}@postgres:5432/treasure_hunt
      REDIS_URL:      redis://redis:6379
      AI_SERVICE_URL: http://python-ai:8000
      OIDC_ISSUER:    http://localhost:8180
      # Route JWKS through nginx so Zitadel receives Host: localhost:8180
      OIDC_JWKS_URL:  http://nginx:80/oauth/v2/keys
      PORT:           "8080"
    restart: on-failure
    depends_on:
      postgres:  { condition: service_healthy }
      zitadel:   { condition: service_healthy }
      redis:     { condition: service_healthy }
      python-ai: { condition: service_healthy }

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  python-ai:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${AI_SERVICE_HOST_PORT:-8001}:8000"
    environment:
      LLM_API_KEY:     ${ANTHROPIC_API_KEY:-${LLM_API_KEY:-}}
      LLM_MODEL:       ${LLM_MODEL:-anthropic/claude-opus-4-7}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      PORT:            "8000"
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Serves the Jupyter Book HTML locally.
  # Build first: cd ../../ && make spring-book (or: jupyter-book build editions/spring/)
  # The _build/html directory must exist before starting this service.
  book:
    image: python:3.11-slim
    working_dir: /html
    command: python -m http.server 8082
    volumes:
      - ./_build/html:/html:ro
    ports:
      - "127.0.0.1:8082:8082"
    profiles:
      - book

volumes:
  pg_data:
