<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="#182818"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13.5" fill="none" stroke="#b86e20" stroke-width="1.2"/>
  <!-- North needle (copper) -->
  <polygon points="16,4.5 17.8,14.5 16,13.2 14.2,14.5" fill="#b86e20"/>
  <!-- South needle (parchment, faded) -->
  <polygon points="16,27.5 17.8,17.5 16,18.8 14.2,17.5" fill="#f5f0e4" opacity="0.45"/>
  <!-- East/West ticks -->
  <line x1="2.5" y1="16" x2="4.5" y2="16" stroke="#b86e20" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="27.5" y1="16" x2="29.5" y2="16" stroke="#b86e20" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Center hub -->
  <circle cx="16" cy="16" r="2.2" fill="#b86e20"/>
  <circle cx="16" cy="16" r="1" fill="#182818"/>
</svg>
